<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TailorTrack Offline</title>
    <meta name="theme-color" content="#4C0D7A">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #FFF9F0;
            color: #1F1330;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }
        main {
            max-width: 420px;
            border: 1px solid rgba(76, 13, 122, 0.12);
            border-radius: 24px;
            background: #fff;
            padding: 28px;
            box-shadow: 0 18px 45px -18px rgba(76, 13, 122, 0.28);
            text-align: center;
        }
        img {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            margin: 0 auto 18px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }
        p {
            margin: 12px 0 0;
            color: #6B6475;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main>
        <img src="images/tailortrack-icon.svg" alt="TailorTrack">
        <h1>Kamu sedang offline</h1>
        <p>Periksa koneksi internet, lalu muat ulang halaman untuk melanjutkan menggunakan TailorTrack.</p>
    </main>
</body>
</html>
